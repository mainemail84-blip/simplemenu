<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کساب • منو</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0a;
    --card:#121212;
    --accent:#c9a23d;
    --text:#f0f0f0;
    --dim:#aaaaaa;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Vazirmatn', sans-serif;
    background:var(--bg); color:var(--text);
  }
  .app{max-width:430px; margin:0 auto; min-height:100vh;}

  /* Header */
  .header{
    padding:20px 16px 12px;
    text-align:center;
    background:#111;
  }
  .logo{
    font-size:28px; font-weight:900; color:var(--accent); margin-bottom:4px;
  }
  .subtitle{font-size:13px; color:#888;}

  .search{
    margin:12px 16px;
    position:relative;
  }
  .search input{
    width:100%; padding:14px 20px 14px 50px;
    background:#1c1c1c; border:1px solid #333; border-radius:16px;
    color:white; font-size:15px;
  }
  .search i{position:absolute; left:18px; top:50%; transform:translateY(-50%); color:#777;}

  /* Categories Tabs */
  .categories{
    display:flex; overflow-x:auto; gap:8px; padding:0 16px 12px;
    white-space:nowrap;
  }
  .cat-tab{
    padding:10px 20px; background:#1c1c1c; border-radius:30px;
    font-size:14.5px; font-weight:600; color:var(--dim);
    transition:all 0.3s;
  }
  .cat-tab.active{
    background:var(--accent); color:#111; font-weight:700;
  }

  /* Menu Grid */
  .menu-grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:12px;
    padding:10px 16px 80px;
  }
  .menu-item{
    background:var(--card);
    border-radius:16px;
    padding:10px;
    text-align:center;
    border:1px solid #222;
  }
  .menu-item img{
    width:100%; height:98px; object-fit:cover; border-radius:12px;
  }
  .menu-item .emoji{
    width:100%; height:98px; background:#222; border-radius:12px;
    font-size:40px; display:flex; align-items:center; justify-content:center;
  }
  .menu-name{
    font-size:13.8px; font-weight:700; margin:8px 0 4px;
    line-height:1.3;
  }
  .menu-price{
    color:var(--accent); font-weight:800; font-size:14.5px;
  }

  /* Info Button */
  .info-btn{
    position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
    background:var(--accent); color:#111; border:none;
    padding:13px 28px; border-radius:50px; font-weight:700;
    box-shadow:0 6px 20px rgba(201,162,61,0.4);
    z-index:100;
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">KASSAB</div>
    <div class="subtitle">کافه و رستوران</div>
  </div>

  <div class="search">
    <input id="searchInput" type="text" placeholder="جستجو در منو...">
    <i class="fa-solid fa-magnifying-glass"></i>
  </div>

  <!-- Category Tabs -->
  <div class="categories" id="catTabs"></div>

  <!-- Menu Items -->
  <div class="menu-grid" id="menuGrid"></div>

  <!-- Info Button -->
  <button class="info-btn" onclick="showInfo()">
    <i class="fa-solid fa-circle-info"></i> اطلاعات
  </button>

</div>

<!-- Info Panel -->
<div id="infoPanel" style="display:none; position:fixed; bottom:0; left:0; right:0; background:#111; padding:25px; border-top:3px solid var(--accent); max-height:70vh; overflow:auto; z-index:200;">
  <h3 style="text-align:center; color:var(--accent); margin-bottom:20px;">اطلاعات کافه</h3>
  <p><strong>آدرس:</strong><br>انتهای خیابان راه آهن</p>
  <p style="margin:15px 0;"><strong>تلفن:</strong><br>۰۲۱-۳۳۳۴۴۵۵۶</p>
  <p><strong>ساعات کاری:</strong><br>۱۰:۰۰ صبح تا ۱۲ شب</p>
  <button onclick="hideInfo()" style="margin-top:20px; width:100%; padding:12px; background:#222; border:none; color:white; border-radius:12px;">بستن</button>
</div>

<script>
let menuItems = [];

async function loadMenu(){
  try{
    const res = await fetch('menu-data.json?t=' + Date.now());
    menuItems = await res.json();
  }catch(e){}
  renderCategories();
  renderMenu();
}

function renderCategories(){
  const cats = [...new Set(menuItems.map(i => i.category))];
  let html = `<div class="cat-tab active" data-cat="all">همه</div>`;
  cats.forEach(cat => {
    html += `<div class="cat-tab" data-cat="${cat}">${cat}</div>`;
  });
  document.getElementById('catTabs').innerHTML = html;

  // Click handlers
  document.querySelectorAll('.cat-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderMenu(tab.dataset.cat);
    });
  });
}

function renderMenu(activeCat = 'all'){
  const container = document.getElementById('menuGrid');
  let filtered = menuItems;

  if(activeCat !== 'all'){
    filtered = menuItems.filter(i => i.category === activeCat);
  }

  let html = '';
  filtered.forEach(item => {
    const price = Number(item.price);
    const hasPrice = !isNaN(price) && price > 0;

    html += `
      <div class="menu-item">
        ${item.image ? `<img src="${item.image}" alt="">` : `<div class="emoji">☕</div>`}
        <div class="menu-name">${item.name}</div>
        ${hasPrice ? `<div class="menu-price">${price.toLocaleString('fa-IR')} تومان</div>` : ''}
      </div>`;
  });

  container.innerHTML = html;
}

function showInfo(){
  document.getElementById('infoPanel').style.display = 'block';
}
function hideInfo(){
  document.getElementById('infoPanel').style.display = 'none';
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  // Simple search - you can enhance later
  renderMenu('all');
});

loadMenu();
</script>
</body>
</html>
